system_context:
  platform: Python UI Automation Framework
  backend_language: Python 3.11+
  project_name: UI-Agent
  description: Intelligent UI automation agent using visual recognition and intent-based workflow execution
components:
- name: model_runner
  file_path: nanovllm/engine/model_runner.py
  layer: Data_Model_Layer
  type: Data_Model_Layer
  responsibilities:
  - '解析与加载: read_shm'
  - '执行逻辑: run'
  - '执行逻辑: run_model'
  - '数据模型: ModelRunner'
  defines:
    functions: 15
    classes: 1
  dependencies:
  - config
  - loader
  - context
  - sequence
  - sampler
  - qwen3
  dependency_count: 6
- name: qwen3
  file_path: nanovllm/models/qwen3.py
